<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>iHuquq — Kabinetim</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
[data-theme="dark"]{--bg:#050810;--s1:#0c1121;--s2:#111827;--s3:#1a2235;--s4:#243047;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.12);--text:#e8edf8;--text2:#6b7a9a;--text3:#3a4560}
[data-theme="light"]{--bg:#f0f4ff;--s1:#fff;--s2:#f7f9ff;--s3:#edf1fa;--s4:#e0e8f5;--border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.13);--text:#0f172a;--text2:#5a6785;--text3:#9ba8c0}
:root{--acc:#4f8eff;--acc2:#7c5cff;--green:#00d68f;--yellow:#ffb020;--red:#ff4757;--teal:#00d4c8;--r:16px;--rs:12px;--rxs:8px;--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;--brand:'Montserrat',sans-serif;--nav-h:60px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased}
#loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.load-logo{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 0 40px rgba(79,142,255,.4);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.load-bar{width:160px;height:3px;background:var(--s3);border-radius:2px;overflow:hidden}
.load-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:2px;animation:lb 1.5s ease-in-out infinite}
@keyframes lb{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
.load-txt{font-size:13px;color:var(--text2);font-weight:600}
#select-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px}
.sel-logo{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:36px}
.sel-title{font-family:var(--brand);font-size:22px;font-weight:900;text-align:center;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sel-sub{font-size:15px;font-weight:700;color:var(--text2);text-align:center}
.sel-cards{width:100%;display:flex;flex-direction:column;gap:12px;margin-top:8px;max-width:360px}
.sel-card{width:100%;padding:18px;border-radius:var(--r);border:none;cursor:pointer;display:flex;align-items:center;gap:16px;transition:opacity .15s}
.sel-card:active{opacity:.8}
.sel-card.off{background:linear-gradient(135deg,rgba(79,142,255,.15),rgba(124,92,255,.1));border:1.5px solid rgba(79,142,255,.3)}
.sel-card.on{background:linear-gradient(135deg,rgba(0,214,143,.12),rgba(0,212,200,.08));border:1.5px solid rgba(0,214,143,.25)}
.sel-ico{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.sel-card.off .sel-ico{background:linear-gradient(135deg,var(--acc),var(--acc2))}
.sel-card.on .sel-ico{background:linear-gradient(135deg,var(--green),var(--teal))}
.sel-card-title{font-size:16px;font-weight:800;color:var(--text);text-align:left}
.sel-card-sub{font-size:12px;color:var(--text2);margin-top:3px;text-align:left}
#app{display:none;flex-direction:column;height:100dvh}
.hero{flex-shrink:0;padding:12px 16px;padding-top:calc(env(safe-area-inset-top,0px)+10px);background:var(--s1);border-bottom:1px solid var(--border)}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hero-brand{display:flex;align-items:center;gap:8px}
.hero-logo{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:15px}
.hero-title{font-family:var(--brand);font-size:16px;font-weight:900;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-right{display:flex;align-items:center;gap:6px}
.hero-btn{width:34px;height:34px;border-radius:10px;background:var(--s3);border:1px solid var(--border);color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mode-bdg{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid}
.mode-bdg.off{background:rgba(79,142,255,.1);color:var(--acc);border-color:rgba(79,142,255,.2)}
.mode-bdg.on{background:rgba(0,214,143,.1);color:var(--green);border-color:rgba(0,214,143,.2)}
.prof-card{background:linear-gradient(135deg,var(--s2),var(--s3));border:1px solid var(--border2);border-radius:var(--r);padding:14px;display:flex;align-items:center;gap:14px}
.prof-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
.prof-name{font-size:16px;font-weight:900}
.prof-meta{font-family:var(--mono);font-size:11px;color:var(--text2);margin-top:2px}
.prof-stats{display:flex;gap:14px;margin-top:8px}
.pst{text-align:center}
.pst-v{font-size:18px;font-weight:900;font-family:var(--mono)}
.pst-l{font-size:9px;color:var(--text2);font-weight:700;margin-top:1px;text-transform:uppercase}
.pages{flex:1;overflow:hidden;position:relative;min-height:0}
.page{position:absolute;inset:0;overflow-y:auto;display:none;padding:14px;padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px) + 14px);-webkit-overflow-scrolling:touch}
.page.on{display:block}
.nav{flex-shrink:0;height:var(--nav-h);background:var(--s1);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 4px;padding-bottom:env(safe-area-inset-bottom,0px)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:5px 2px;cursor:pointer;font-size:9px;font-weight:700;color:var(--text3);border-radius:10px;transition:all .2s;text-transform:uppercase;position:relative}
.ni .ic{font-size:21px;line-height:1;transition:transform .2s}
.ni.on{color:var(--acc)}.ni.on .ic{transform:translateY(-1px)}
.ni.on::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:18px;height:3px;border-radius:2px;background:linear-gradient(90deg,var(--acc),var(--acc2))}
.sec{font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.sec:first-child{margin-top:0}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.srow{display:flex;gap:6px;margin-bottom:12px}
.sbox{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 6px;text-align:center}
.sbox .v{font-size:19px;font-weight:900;font-family:var(--mono)}.sbox .l{font-size:10px;color:var(--text2);font-weight:700;margin-top:2px}
.sbox.g .v{color:var(--green)}.sbox.y .v{color:var(--yellow)}.sbox.r .v{color:var(--red)}.sbox.b .v{color:var(--acc)}
.lrow{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--s3);border-radius:var(--rs);margin-bottom:6px;border:1px solid var(--border)}
.li{flex:1;min-width:0}
.ln{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ls{font-size:11px;color:var(--text2);margin-top:2px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.av0{background:rgba(79,142,255,.15);color:var(--acc)}.av1{background:rgba(124,92,255,.15);color:var(--acc2)}.av2{background:rgba(0,214,143,.15);color:var(--green)}.av3{background:rgba(255,176,32,.15);color:var(--yellow)}.av4{background:rgba(255,71,87,.15);color:var(--red)}
.att-dot{display:inline-flex;width:28px;height:28px;border-radius:8px;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.att-dot.K{background:rgba(0,214,143,.15);color:var(--green)}.att-dot.KCH{background:rgba(255,176,32,.15);color:var(--yellow)}.att-dot.KM{background:rgba(255,71,87,.15);color:var(--red)}.att-dot.em{background:var(--s3);color:var(--text3)}
.rey-row{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:11px 14px;margin-bottom:6px;transition:all .2s}
.rey-rank{width:32px;height:32px;border-radius:9px;background:var(--s3);font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--mono)}
.rey-bar{width:100%;background:var(--s3);border-radius:3px;height:4px;margin-top:5px}
.rey-fill{height:4px;border-radius:3px;transition:width .8s cubic-bezier(.34,1.56,.64,1)}
/* Podium */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:20px;padding:0 4px}
.podium-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;max-width:110px}
.podium-av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;border:3px solid transparent;flex-shrink:0}
.podium-name{font-size:11px;font-weight:800;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
.podium-ball{font-family:var(--mono);font-size:13px;font-weight:900}
.podium-base{width:100%;border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900}
.podium-1 .podium-base{background:linear-gradient(135deg,#ffd700,#ffb700);height:72px}
.podium-2 .podium-base{background:linear-gradient(135deg,#c0c0c0,#a8a8a8);height:54px}
.podium-3 .podium-base{background:linear-gradient(135deg,#cd7f32,#b8651a);height:42px}
/* Statistika */
.rey-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.rey-stat{background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 6px;text-align:center}
.rey-stat-v{font-size:18px;font-weight:900;font-family:var(--mono)}
.rey-stat-l{font-size:10px;color:var(--text2);font-weight:700;margin-top:3px}
.test-opt{width:100%;padding:13px;border-radius:var(--rs);background:var(--s3);border:1.5px solid var(--border);color:var(--text);font-size:14px;font-weight:600;text-align:left;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;gap:10px;transition:all .15s}
.test-opt:active{background:var(--s4)}.test-opt.sel{border-color:var(--acc);background:rgba(79,142,255,.08)}.test-opt.correct{border-color:var(--green);background:rgba(0,214,143,.08)}.test-opt.wrong{border-color:var(--red);background:rgba(255,71,87,.08)}
.opt-l{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;background:var(--s4)}
.test-opt.sel .opt-l{background:var(--acc);color:#fff}.test-opt.correct .opt-l{background:var(--green);color:#000}.test-opt.wrong .opt-l{background:var(--red);color:#fff}
.btn{padding:12px 18px;border-radius:var(--rxs);background:var(--acc);color:#fff;font-size:13px;font-weight:800;border:none;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.8}.btn.gr{background:var(--green)}.btn.sec{background:var(--s3);color:var(--text);border:1px solid var(--border)}
.btn-full{width:100%;padding:14px;border-radius:var(--r);font-size:15px;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:none;cursor:pointer}
#result-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.res-circle{width:120px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 18px;border:4px solid var(--acc)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;z-index:150;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px)}
.ov.on{opacity:1;pointer-events:all}
.modal{background:var(--s2);border-radius:24px 24px 0 0;padding:20px 16px calc(env(safe-area-inset-bottom,0px)+28px);width:100%;border-top:1px solid var(--border2);transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-height:92dvh;overflow-y:auto}
.ov.on .modal{transform:translateY(0)}
.mh{width:40px;height:4px;background:var(--s4);border-radius:2px;margin:0 auto 16px}
.toast{position:fixed;bottom:calc(var(--nav-h)+16px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--s4);border:1px solid var(--border2);color:var(--text);padding:11px 22px;border-radius:22px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;color:var(--text3);padding:28px 16px;font-size:14px;font-weight:600}
</style>
</head>
<body>
<div id="loading">
  <div class="load-logo">&#x2696;&#xFE0F;</div>
  <div class="load-bar"><div class="load-fill"></div></div>
  <div class="load-txt">Kabinet yuklanmoqda...</div>
</div>
<div id="select-screen">
  <div class="sel-logo">&#x2696;&#xFE0F;</div>
  <div class="sel-title">iHuquq</div>
  <div class="sel-sub" id="sel-name">Kabinetni tanlang</div>
  <div class="sel-cards">
    <button class="sel-card off" onclick="loadMode('offline')">
      <div class="sel-ico">&#x1F3EB;</div>
      <div><div class="sel-card-title">Oflayn kabinet</div><div class="sel-card-sub">Davomat &middot; Reyting &middot; To'lov</div></div>
    </button>
    <button class="sel-card on" onclick="loadMode('online')">
      <div class="sel-ico">&#x1F4BB;</div>
      <div><div class="sel-card-title">Onlayn kabinet</div><div class="sel-card-sub">Kurslar &middot; Testlar &middot; Reyting</div></div>
    </button>
  </div>
</div>
<div id="app">
  <div class="hero">
    <div class="hero-top">
      <div class="hero-brand">
        <div class="hero-logo">&#x2696;&#xFE0F;</div>
        <div class="hero-title">iHuquq</div>
      </div>
      <div class="hero-right">
        <div id="mode-bdg" class="mode-bdg off">&#x1F3EB; Oflayn</div>
        <button class="hero-btn" id="switch-btn" style="display:none" onclick="switchMode()">&#x1F504;</button>
        <button class="hero-btn" onclick="toggleTheme()" id="theme-btn">&#x1F319;</button>
      </div>

    <div class="prof-card">
      <div class="prof-av" id="prof-av">?</div>

        <div class="prof-meta" id="prof-meta">&#x2014;</div>

          <div class="pst"><div class="pst-v" id="p-score" style="color:var(--acc)">0</div><div class="pst-l">Ball</div></div>
          <div class="pst"><div class="pst-v" id="p-tests" style="color:var(--green)">0</div><div class="pst-l">Test</div></div>
          <div class="pst"><div class="pst-v" id="p-att" style="color:var(--yellow)">&#x2014;</div><div class="pst-l">Davomat</div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="pages">
    <div class="page on" id="page-home"><div id="home-content"></div><div style="height:16px"></div></div>
    <div class="page" id="page-att"><div id="att-content"></div><div style="height:16px"></div></div>
    <div class="page" id="page-rey"><div id="rey-content"></div><div style="height:16px"></div></div>
    <div class="page" id="page-tests"><div id="tests-content"></div><div style="height:16px"></div></div>
    <div class="page" id="page-pay"><div id="pay-content"></div><div style="height:16px"></div></div>
  </div>
  <div class="nav">
    <div class="ni on" data-p="home"><span class="ic">&#x1F3E0;</span>Bosh</div>
    <div class="ni" data-p="att" id="nav-att"><span class="ic">&#x2705;</span>Davomat</div>
    <div class="ni" data-p="rey"><span class="ic">&#x1F3C6;</span>Reyting</div>
    <div class="ni" data-p="tests"><span class="ic">&#x1F4DD;</span>Testlar</div>
    <div class="ni" data-p="pay" id="nav-pay"><span class="ic">&#x1F4B3;</span>To'lov</div>
  </div>
</div>
<div id="result-screen">
  <div class="res-circle" id="res-circle">
    <div style="font-size:32px;font-weight:900;font-family:var(--mono)" id="res-pct">0%</div>
    <div style="font-size:12px;font-weight:700;margin-top:2px" id="res-ball">0/0</div>
  </div>
  <div style="font-size:22px;font-weight:900;margin-bottom:8px" id="res-grade">&#x2014;</div>
  <div style="font-size:14px;margin-bottom:24px" id="res-pass">&#x2014;</div>
  <div style="display:flex;gap:20px;margin-bottom:28px">
    <div class="pst"><div class="pst-v" id="res-correct" style="color:var(--green)">0</div><div class="pst-l">To'g'ri</div></div>
    <div class="pst"><div class="pst-v" id="res-wrong" style="color:var(--red)">0</div><div class="pst-l">Noto'g'ri</div></div>
    <div class="pst"><div class="pst-v" id="res-time" style="color:var(--acc)">0</div><div class="pst-l">Daqiqa</div></div>
  </div>
  <button class="btn-full" onclick="closeResult()" style="max-width:300px">&#x2190; Testlarga qaytish</button>
</div>
<div class="ov" id="ov"><div class="modal"><div class="mh"></div><div id="modal-body"></div></div></div>
<div class="toast" id="toast"></div>
<script>
const SB='https://lwpimllflhpcxtehkgjb.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3cGltbGxmbGhwY3h0ZWhrZ2piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NzMzNDYsImV4cCI6MjA4OTM0OTM0Nn0.yq2XHQBE6nyfHtRWbbo4C7V5sma5DaCEwzCu9wS1f9M';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};
const GET=(t,p)=>fetch(SB+'/rest/v1/'+t+(p||''),{headers:H}).then(r=>r.json());
const POST=(t,b)=>fetch(SB+'/rest/v1/'+t,{method:'POST',headers:H,body:JSON.stringify(b)}).then(r=>r.json());
const PATCH=(t,b,p)=>fetch(SB+'/rest/v1/'+t+(p||''),{method:'PATCH',headers:{...H,'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(b)}).then(r=>r.json());
let TID=null,MODE='offline',OFF=null,ON=null,hasBoth=false;
let tTmr=null,tStart=null,tQs=[],tAns={},tData=null,tIdx=0;
const MO=['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
function avl(n){return(n||'?').split(' ').slice(0,2).map(function(w){return(w[0]||'').toUpperCase()}).join('')}
function fD(d){if(!d)return'--';var dt=new Date(d);return dt.getDate()+' '+MO[dt.getMonth()]}
function fDT(d){if(!d)return'--';var dt=new Date(d);return dt.getDate()+' '+MO[dt.getMonth()]+', '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0')}
function tod(){return new Date().toISOString().slice(0,10)}
async function init(){
  try{
  var p=new URLSearchParams(window.location.search);
  TID=parseInt(p.get('tgid'))||null;
  var mP=p.get('mode');
  if(window.Telegram&&window.Telegram.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();if(!TID)TID=Telegram.WebApp.initDataUnsafe&&Telegram.WebApp.initDataUnsafe.user?Telegram.WebApp.initDataUnsafe.user.id:null;}

async function renderAtt(){

async function renderRey(){
  var cont=document.getElementById('rey-content');

  if(MODE==='offline'&&OFF){
    // Barcha oflayn o'quvchilar reytingi (faqat guruh emas)
    var sts=await GET('students','?select=id,name');

  }else if(MODE==='online'&&ON){

    var sts2=await GET('online_students','?select=id,full_name,tg_id');

    var onIds=sts2.map(function(s){return s.id});

    var mp2={};
    sts2.forEach(function(s){mp2[s.id]={name:s.full_name||'Nomalum',id:s.id,tgId:s.tg_id,total:0}});
    sc2.forEach(function(s){if(mp2[s.student_id])mp2[s.student_id].total+=s.points||0});
    // Faqat onlayn o'quvchilarning test natijalari

  var totalCount=ranked.length;

  // Statistika
  var statsHtml='<div class="rey-stats">'+
    '<div class="rey-stat"><div class="rey-stat-v" style="color:var(--acc)">'+totalCount+'</div><div class="rey-stat-l">Jami</div></div>'+
    '<div class="rey-stat"><div class="rey-stat-v" style="color:var(--green)">'+(ranked[0]?ranked[0].total:0)+'</div><div class="rey-stat-l">Eng yuqori</div></div>'+
    '<div class="rey-stat"><div class="rey-stat-v" style="color:var(--yellow)">'+avg+'</div><div class="rey-stat-l">O\x27rtacha</div></div>'+
  '</div>';

  // Podium — Top 3 (2-chi, 1-chi, 3-chi)
  var podiumHtml='';
  if(ranked.length>=2){
    var podiumOrder=[1,0,2];
    podiumHtml='<div class="podium">';
    podiumOrder.forEach(function(idx){
      var s=ranked[idx];if(!s)return;
      var rank=idx+1;

      var col=s.total>0?'var(--green)':s.total<0?'var(--red)':'var(--text2)';
      var borderCol=rank===1?'#ffd700':rank===2?'#c0c0c0':'#cd7f32';

        '<div class="podium-av av av'+(idx%5)+'" style="width:'+avSize+'px;height:'+avSize+'px;font-size:'+(rank===1?17:14)+'px;border-color:'+borderCol+(isMe?';box-shadow:0 0 0 3px var(--acc)':'')+'">'+avl(s.name)+'</div>'+
        '<div class="podium-name" style="color:'+(isMe?'var(--acc)':'var(--text)')+'">'+s.name+(isMe?' 👈':'')+'</div>'+
        '<div class="podium-ball" style="color:'+col+'">'+s.total+'</div>'+
        '<div class="podium-base">'+(rank===1?'🥇':rank===2?'🥈':'🥉')+'</div>'+
      '</div>';
    });
    podiumHtml+='</div>';
  }

  // Sizning o'rningiz (top 3 dan tashqarida)
  var myCard='';
  if(myR>3&&myD){
    var myCol=myD.total>0?'var(--green)':myD.total<0?'var(--red)':'var(--text2)';
    myCard='<div class="card" style="border:2px solid var(--acc);background:rgba(79,142,255,.06);margin-bottom:12px">'+

        '<div style="flex:1;min-width:0">'+
          '<div style="font-size:14px;font-weight:900;color:var(--acc)">'+myD.name+' ← Siz</div>'+
          '<div style="font-size:11px;color:var(--text2);margin-top:2px">Sizning o\x27rningiz</div>'+
        '</div>'+
        '<div style="font-family:var(--mono);font-size:20px;font-weight:900;color:'+myCol+'">'+myD.total+'</div>'+
      '</div>'+
    '</div>';

  // 4-dan boshlab ro'yxat

  var listHtml=ranked.slice(listStart).map(function(s,i){
    var realIdx=listStart+i;

    var pct=mx?Math.max(4,Math.round((Math.max(0,s.total)/Math.max(1,mx))*100)):4;
    return'<div class="rey-row" style="'+(isMe?'border:2px solid var(--acc);background:rgba(79,142,255,.05)':'')+'">'+

      '<div style="flex:1;min-width:0">'+

        '<div class="rey-bar"><div class="rey-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'+

  var lp=Math.round((left/dur)*100);
  clearInterval(tTmr);
  openModal('<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:12px;font-weight:800;color:var(--text2)">'+(tIdx+1)+'/'+tot+'</span><span id="td" style="font-family:var(--mono);font-size:13px;font-weight:700;color:'+(left<60?'var(--red)':'var(--text2)')+'">'+Math.floor(left/60)+':'+String(left%60).padStart(2,'0')+'</span></div><div style="height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-bottom:14px"><div id="tf" style="height:100%;width:'+lp+'%;background:linear-gradient(90deg,var(--green),var(--acc));border-radius:2px;transition:width 1s linear"></div></div><div style="font-size:15px;font-weight:700;line-height:1.5;margin-bottom:14px">'+q.question_text+'</div>'+['A','B','C','D'].map(function(o){return'<button class="test-opt" id="o-'+o+'" data-opt="'+o+'" data-qid="'+q.id+'" onclick="selAns(this.dataset.opt,this.dataset.qid)"><div class="opt-l">'+o+'</div><span>'+q['option_'+o.toLowerCase()]+'</span></button>'}).join('')+'<div style="display:flex;gap:8px;margin-top:10px">'+(tIdx>0?'<button class="btn sec" style="flex:1;padding:12px" onclick="prevQ()">Oldingi</button>':'')+'<button class="btn '+(tIdx<tot-1?'':'gr')+'" style="flex:1;padding:12px" onclick="'+(tIdx<tot-1?'nextQ()':'doSubmit()')+'">'+( tIdx<tot-1?'Keyingi':'Yuborish')+'</button></div>');
  var prev=tAns[q.id];if(prev){var b=document.getElementById('o-'+prev);if(b)b.classList.add('sel');}
  tTmr=setInterval(function(){
    var el=Math.round((Date.now()-tStart)/1000),l2=Math.max(0,dur-el);
    var td=document.getElementById('td'),tf=document.getElementById('tf');
    if(td){td.textContent=Math.floor(l2/60)+':'+String(l2%60).padStart(2,'0');td.style.color=l2<60?'var(--red)':'var(--text2)';}
    if(tf)tf.style.width=Math.round((l2/dur)*100)+'%';
    if(l2<=0){clearInterval(tTmr);doSubmit();}
  },1000);
}
function selAns(o,qId){tAns[qId]=o;['A','B','C','D'].forEach(function(x){var b=document.getElementById('o-'+x);if(b)b.classList.remove('sel')});var b=document.getElementById('o-'+o);if(b)b.classList.add('sel');}
function prevQ(){if(tIdx>0){tIdx--;showQ();}}
function nextQ(){if(tIdx<tQs.length-1){tIdx++;showQ();}}
async function doSubmit(){
  clearInterval(tTmr);document.getElementById('ov').classList.remove('on');
  var score=0,total=0,correct=0;
  tQs.forEach(function(q){var p=q.score||2;total+=p;if(tAns[q.id]===q.correct_answer){score+=p;correct++;}});
  var pct=total?Math.round((score/total)*100):0;
  var passed=pct>=(tData.pass_score||60);
  var mins=Math.round((Date.now()-tStart)/60000);
  var rs=await GET('test_results','?test_id=eq.'+tData.id+'&tg_id=eq.'+TID+'&finished_at=is.null&select=id&limit=1');
  if(rs.length)await PATCH('test_results',{answers:tAns,score:score,total_score:total,finished_at:new Date().toISOString(),ball_added:tData.rated||false},'?id=eq.'+rs[0].id);
  if(tData.rated&&score>0){var sid=MODE==='offline'?(OFF&&OFF.id):(ON&&ON.id);if(sid)await POST('scores',{student_id:sid,date:tod(),points:score,note:'Test: '+tData.title+' ('+pct+'%)'});}
  var col=pct>=80?'var(--green)':pct>=60?'var(--yellow)':'var(--red)';
  var grade=pct>=90?'Mukammal':pct>=80?'A - Yaxshi':pct>=70?'B - Orta':pct>=60?'C - Qoniqarli':'D - Qoniqarsiz';
  document.getElementById('res-circle').style.borderColor=col;
  document.getElementById('res-pct').textContent=pct+'%';document.getElementById('res-pct').style.color=col;
  document.getElementById('res-ball').textContent=score+'/'+total+' ball';
  document.getElementById('res-grade').textContent=grade;
  document.getElementById('res-pass').textContent=passed?'Testdan otdingiz!':'Otish bali: '+(tData.pass_score||60)+'%';
  document.getElementById('res-pass').style.color=passed?'var(--green)':'var(--red)';
  document.getElementById('res-correct').textContent=correct;
  document.getElementById('res-wrong').textContent=tQs.length-correct;
  document.getElementById('res-time').textContent=mins;
  document.getElementById('result-screen').style.display='flex';
  loadProfile();
}
function closeResult(){document.getElementById('result-screen').style.display='none';renderTests();}
async function renderPay(){
  var now=new Date();
  var html='';

  if(MODE==='offline'&&OFF){
    // Oflayn to'lov — oylik payments jadvali
    for(var m=2;m>=0;m--){
      var d=new Date(now.getFullYear(),now.getMonth()-m,1);
      var ms=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
      var res=await Promise.all([
        GET('payments','?student_id=eq.'+OFF.id+'&month=eq.'+ms+'&select=*'),
        GET('group_students','?student_id=eq.'+OFF.id+'&select=*,groups(name,courses(title))')
      ]);
      var pays=res[0],gs=res[1];
      html+='<div class="sec">'+MO[d.getMonth()]+' '+d.getFullYear()+'</div>';
      if(!gs.length){html+='<div class="empty">Guruh yoq</div>';continue;}
      gs.forEach(function(g){
        var p=pays.find(function(x){return x.group_id===g.group_id});
        var paid=p&&p.paid||false;
        var col=paid?'var(--green)':'var(--red)';
        html+='<div class="card" style="border-left:3px solid '+col+'"><div style="display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:14px;font-weight:800">'+(g.groups&&g.groups.name||'Guruh')+'</div><div style="font-size:12px;color:var(--text2);margin-top:2px">'+(g.groups&&g.groups.courses&&g.groups.courses.title||'--')+' - '+((g.monthly_fee||0).toLocaleString())+' som</div></div><div style="text-align:right"><div style="font-size:15px;font-weight:900;color:'+col+'">'+(paid?'Tolangan':'Tolanmagan')+'</div>'+(p&&p.paid_at?'<div style="font-size:10px;color:var(--text3)">'+fD(p.paid_at)+'</div>':'')+'</div></div></div>';
      });
    }

  } else if(MODE==='online'&&ON){
    // Onlayn to'lov — enrollment_requests
    var enrolls=await GET('enrollment_requests','?tg_id=eq.'+ON.tg_id+'&status=eq.approved&select=*,courses(title,price,card_number,card_owner)');
    if(!enrolls.length){
      document.getElementById('pay-content').innerHTML='<div class="empty">Hali kursga yozilmagansiz</div>';return;
    }

    // Har oy 1-sanaga necha kun qoldi
    var dayOfMonth=now.getDate();
    var daysLeft=1; // Keyingi oy 1-sanasiga
    if(dayOfMonth>1){
      var nextFirst=new Date(now.getFullYear(),now.getMonth()+1,1);
      daysLeft=Math.ceil((nextFirst-now)/(1000*60*60*24));
    }

    // To'lov holati (vaqt bo'yicha)
    var payStatus,payColor,payMsg;
    if(dayOfMonth===1){
      payStatus='⚠️ Bugun to\'lov kuni!';payColor='var(--yellow)';
    } else if(dayOfMonth<=7){
      payStatus='📅 To\'lov muddati: '+daysLeft+' kun';payColor='var(--yellow)';
    } else {
      payStatus='✅ Keyingi to\'lov: '+daysLeft+' kun';payColor='var(--green)';
    }

    html+='<div class="card" style="background:rgba(79,142,255,.05);border-color:rgba(79,142,255,.2);margin-bottom:14px"><div style="font-size:14px;font-weight:800;color:'+payColor+';margin-bottom:4px">'+payStatus+'</div><div style="font-size:12px;color:var(--text2)">Har oy 1-sanagacha to\'lov qilinishi kerak</div></div>';
    html+='<div class="sec">Kurslarim</div>';

    enrolls.forEach(function(e){
      var c=e.courses;
      html+='<div class="card"><div style="font-size:15px;font-weight:800;margin-bottom:8px">'+(c&&c.title||'Kurs')+'</div>';
      html+='<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:var(--text2);font-size:12px">Oylik to\'lov</span><span style="font-weight:800;font-family:var(--mono)">'+((e.amount||c&&c.price||0).toLocaleString())+' so\'m</span></div>';
      if(c&&c.card_number){
        html+='<div style="background:var(--s3);border-radius:10px;padding:12px;margin-top:6px">';
        html+='<div style="font-size:11px;color:var(--text2);margin-bottom:4px">To\'lov rekviziti:</div>';
        html+='<div style="font-family:var(--mono);font-size:14px;font-weight:800">'+c.card_number+'</div>';
        if(c.card_owner)html+='<div style="font-size:12px;color:var(--text2);margin-top:2px">'+c.card_owner+'</div>';
        html+='</div>';
      }
      html+='</div>';
    });
  }

  document.getElementById('pay-content').innerHTML=html||'<div class="empty">Ma\'lumot yoq</div>';
}
function toggleTheme(){var h=document.documentElement;var d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');document.getElementById('theme-btn').textContent=d?'moon':'sun';localStorage.setItem('ihuquq_theme',d?'light':'dark')}
function openModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('ov').classList.add('on')}
function closeModal(){clearInterval(tTmr);document.getElementById('ov').classList.remove('on')}
document.getElementById('ov').onclick=function(e){if(e.target===e.currentTarget){clearInterval(tTmr);closeModal();}};
var _t;
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(_t);_t=setTimeout(function(){t.classList.remove('on')},2800)}
init();
</script>
